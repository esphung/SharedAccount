name: "Install Dependencies"
description: "Sets up Node.js and installs dependencies"

runs:
    using: "composite"
    steps:
        - name: Enable Corepack
          run: corepack enable
          shell: bash

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
              node-version: "22.12.0"
              cache: "yarn"

        - name: Install dependencies
          run: yarn install --immutable
          shell: bash
