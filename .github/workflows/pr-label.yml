name: Label PRs

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, unlabeled, labeled]

jobs:
  pr-label:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add labels to PR
        uses: actions/labeler@v5
